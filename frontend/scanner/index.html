<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Escáner de Alimentos</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="onboarding-card">
            <div class="header">
                <h1 id="title"></h1>
                <p id="subtitle"></p>
            </div>

            <!-- Visor de la Cámara -->
            <div class="scanner-viewfinder">
                <!-- Esquinas de target -->
                <div class="corner top-left"></div>
                <div class="corner top-right"></div>
                <div class="corner bottom-left"></div>
                <div class="corner bottom-right"></div>

                <!-- Láser Animado CSS (visible cuando no hay cámara real) -->
                <div id="scanner-laser" class="scanner-laser"></div>

                <!-- [LÓGICO BACKEND] Contenedor del stream de cámara real -->
                <div id="reader"></div>
            </div>

            <button type="button" id="btn-activate" class="btn-submit"></button>

            <!-- Panel de Estado Minimizado -->
            <div id="interaction-panel" class="interaction-panel">
                <div id="panel-header" class="panel-header">
                    <span id="panel-title"></span>
                    <svg width="20" height="20" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M19 9l-7 7-7-7" />
                    </svg>
                </div>
                <div class="panel-body">
                    <p id="panel-status" class="panel-muted"></p>
                </div>
            </div>

            <!-- [LÓGICO BACKEND] Tarjeta de Resultado del Producto (oculta por defecto) -->
            <div id="result-card" class="result-card" style="display:none;">
                <div class="result-header">
                    <img id="product-image" class="product-image" src="" alt="">
                    <div class="product-meta">
                        <h3 id="product-name" class="product-name"></h3>
                        <div id="semaforo" class="semaforo"></div>
                    </div>
                </div>
                <p id="product-recommendation" class="product-recommendation"></p>
                <div class="result-actions">
                    <button type="button" id="btn-register" class="btn-action btn-action-register"></button>
                    <button type="button" id="btn-discard" class="btn-action btn-action-discard"></button>
                </div>
            </div>

        </div>
    </div>

    <!-- CDN: Escáner de código de barras -->
    <script src="https://unpkg.com/html5-qrcode@2.3.8/html5-qrcode.min.js"></script>

    <!-- Scripts del sistema -->
    <script src="i18n.js"></script>
    <!-- Caché local AES-GCM — debe cargar antes de app.js -->
    <script src="../shared/storage.js"></script>
    <!-- Capa 1: Escudo Crítico (reglas de vida o muerte) -->
    <script src="../shared/critical-rules.js"></script>
    <!-- Capa 2: Agente de IA médica (Claude proxy) -->
    <script src="../services/ai-medical-agent.js"></script>
    <script src="app.js"></script>
</body>
</html>
