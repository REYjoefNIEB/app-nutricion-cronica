<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Perfil Médico</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <!-- UI Styles -->
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <!-- [AGENTE 04] Banner de Emergencia Fijo -->
    <div class="emergency-banner">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
            <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" />
        </svg>
        <span>Nura no atiende emergencias. Llama al 131 si estás en crisis.</span>
    </div>
    <div class="container">
        <div class="onboarding-card">
            <div class="header">
                <h1 id="title"></h1>
                <p id="subtitle"></p>
            </div>
            
            <form id="onboarding-form">
                <div class="row">
                    <div class="form-group">
                        <label id="label-weight" for="input-weight"></label>
                        <div class="input-wrapper">
                            <input type="number" id="input-weight" min="20" max="300" step="0.1" required>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label id="label-height" for="input-height"></label>
                        <div class="input-wrapper">
                            <input type="number" id="input-height" min="50" max="250" required>
                        </div>
                    </div>
                </div>
                
                <div class="form-group">
                    <label id="label-pathology" for="select-pathology"></label>
                    <div class="input-wrapper select-wrapper">
                        <select id="select-pathology" required>
                            <!-- Options added via JS for i18n support -->
                        </select>
                    </div>
                </div>
                
                <!-- [AGENTE 01 — Legal & Compliance] Consentimiento Informado -->
                <div class="consent-section">
                    <h2 class="consent-title" id="consent-title"></h2>

                    <!-- Bloque: Aviso Médico -->
                    <div class="legal-block">
                        <button type="button" class="legal-toggle" id="toggle-disclaimer">
                            <span id="disclaimer-title"></span>
                        </button>
                        <div class="legal-body" id="body-disclaimer" hidden>
                            <p id="disclaimer-text"></p>
                        </div>
                    </div>

                    <!-- Bloque: Política de Privacidad -->
                    <div class="legal-block">
                        <button type="button" class="legal-toggle" id="toggle-privacy">
                            <span id="privacy-title"></span>
                        </button>
                        <div class="legal-body" id="body-privacy" hidden>
                            <p id="privacy-text"></p>
                        </div>
                    </div>

                    <!-- Checkbox 1: Obligatorio (terms + disclaimer) -->
                    <label class="consent-check-label" for="check-terms">
                        <input type="checkbox" id="check-terms">
                        <span id="label-terms"></span>
                    </label>

                    <!-- Bloque: Consentimiento I+D IA -->
                    <div class="legal-block">
                        <button type="button" class="legal-toggle" id="toggle-ai">
                            <span id="ai-title"></span>
                        </button>
                        <div class="legal-body" id="body-ai" hidden>
                            <p id="ai-text"></p>
                        </div>
                    </div>

                    <!-- Checkbox 2: Opcional (entrenamiento IA) -->
                    <label class="consent-check-label" for="check-ai-training">
                        <input type="checkbox" id="check-ai-training">
                        <span id="label-ai-training"></span>
                    </label>
                </div>

                <button type="submit" id="btn-submit" class="btn-submit" disabled></button>
            </form>
            
            <div class="footer">
                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 15v2m-6 4h12a2 2 0 002-2v-6a2 2 0 00-2-2H6a2 2 0 00-2 2v6a2 2 0 002 2zm10-10V7a4 4 0 00-8 0v4h8z" />
                </svg>
                <span id="footer-text"></span>
            </div>
        </div>
    </div>

    <!-- Scripts (loaded consecutively, no modules to fix local execution) -->
    <script src="i18n.js"></script>
    <!-- [AGENTE 01] Contenido legal centralizado — carga antes de app.js -->
    <script src="../shared/legal-content.js"></script>
    <!-- [LÓGICO BACKEND] Caché local AES-GCM — debe cargar antes de app.js -->
    <script src="../shared/storage.js"></script>
    <!-- [LÓGICO BACKEND] Inicializa window.NuraFirebase antes de DOMContentLoaded -->
    <script type="module" src="../shared/firebase-config.js"></script>
    <script src="app.js"></script>
</body>
</html>
